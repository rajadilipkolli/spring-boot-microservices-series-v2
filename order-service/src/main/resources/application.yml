server:
  port: 18282
  servlet:
    contextPath: /${spring.application.name}
  forward-headers-strategy: framework
spring:
  application:
    name: order-service
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
    streams:
      clientId: order-service-stream-client
      replicationFactor: 1
      producer:
        acks: all
      application-id: ${spring.application.name}
      properties:
        commit:
          interval:
            ms: 100
        num:
          stream:
            threads: 2
        default:
          timestamp:
            extractor: org.apache.kafka.streams.processor.WallclockTimestampExtractor
          key:
            serde: org.apache.kafka.common.serialization.Serdes$StringSerde
          value:
            serde: org.springframework.kafka.support.serializer.JsonSerde
        spring:
          json:
            trusted:
              packages: '*'
        processing.guarantee: exactly_once_v2
      # state-dir: ${java.io.tmpdir}/kafka-streams/${spring.application.name}
  modulith:
    events:
      # to enable auto initialization need to add the dependency spring-modulith-starter-jpa and a datasource configuration
      #      jdbc:
      #        schema-initialization:
      #          enabled: true
      externalization:
        enabled: true
        mode: outbox
      republish-outstanding-events-on-restart: true
      completion-mode: archive

  threads:
    virtual:
      enabled: true
  testcontainers:
    beans:
      startup: parallel

### the background-job-server and dashboard are disabled by default
jobrunr:
  job-scheduler:
    enabled: true
  background-job-server:
    enabled: true
    poll-interval-in-seconds: 5  #This is the minimum interval in seconds between two polls for new jobs. Default is 15 seconds.
    metrics.enabled: true
  dashboard:
    enabled: true
    port: 28282
  miscellaneous:
    allow-anonymous-data-usage: false
